name: Generate Snake Animation

on:
  # 每 12 小时自动刷新一次贪吃蛇
  schedule:
    - cron: "0 */12 * * *"
  # 允许在 Actions 页面手动触发
  workflow_dispatch:
  # 推送到 main 时也生成一次
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake game from contribution grid
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=bd93f9&color_dots=#282a36,#44475a,#6272a4,#bd93f9,#ff79c6

      # 把生成的 SVG 推到 output 分支，README 从该分支引用
      - name: Push snake to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
